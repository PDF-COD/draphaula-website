<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Dra. Phaula Ferreira</title>
  <link rel="icon" type="image/png" href="assets/images/flor.webp">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Raleway:wght@300;400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1520;
      color: #f0e8e0;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 500px; }
    .logo { width: 80px; margin: 0 auto 2rem; opacity: 0.7; }
    .logo img { width: 100%; }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 400;
      color: #B08090;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1rem;
      color: #9a8a78;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      font-size: 0.9rem;
      font-weight: 500;
      color: #f0e8e0;
      background: linear-gradient(135deg, #956070, #7A2938);
      padding: 12px 32px;
      border-radius: 9999px;
      text-decoration: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(122, 41, 56, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="assets/images/flor.webp" alt=""></div>
    <h1>404</h1>
    <p>A página que você procura não foi encontrada. Mas estou aqui para cuidar de você.</p>
    <a href="/">Voltar ao Início</a>
  </div>
</body>
</html>
